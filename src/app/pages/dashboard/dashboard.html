<div class="dashboard-container">
  <!-- Barra de navegación superior -->
  <mat-toolbar color="primary" class="navbar">
    <span class="logo-text">
      <mat-icon class="icon-align">leaderboard</mat-icon>
      InvenMax IA
    </span>
    <span class="spacer"></span>
    <button mat-flat-button class="logout-btn" (click)="cerrarSesion()">
      <mat-icon>logout</mat-icon>
      Cerrar Sesión
    </button>
  </mat-toolbar>

  <!-- Área de Contenido Central -->
  <main class="content-area" style="padding: 24px; background-color: #f8f9fa;">
    
    <!-- Encabezado del Panel -->
    <div style="margin-bottom: 24px;">
      <h2 style="color: #1e3a8a; margin: 0; font-size: 24px; font-weight: 600;">Panel de Inventario en Tiempo Real</h2>
      <p style="color: #6b7280; margin: 4px 0 0 0;">Datos reales persistidos en Neon Cloud (PostgreSQL)</p>
    </div>

    <!-- Grid Dinámico usando las Tarjetas de Angular Material -->
    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px;">
      
      <mat-card *ngFor="let prod of inventario" style="border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); overflow: hidden;">
        <mat-card-header style="background-color: #f1f5f9; padding: 12px 16px;">
          <mat-card-title style="font-size: 16px; font-weight: 600; color: #1e293b; margin: 0;">
            {{ prod.nombre }}
          </mat-card-title>
          <mat-card-subtitle style="margin-top: 4px;">
            <span style="font-size: 11px; background-color: #dbeafe; color: #2563eb; padding: 2px 8px; border-radius: 12px; font-weight: 600;">
              {{ prod.categoria }}
            </span>
          </mat-card-subtitle>
        </mat-card-header>

        <mat-card-content style="padding: 16px;">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 8px;">
            <div>
              <p style="margin: 0; font-size: 12px; color: #64748b;">Stock Actual</p>
              <!-- Si el stock baja del mínimo, se resalta visualmente en rojo -->
              <span [style.color]="prod.stockActual < prod.stockMinimo ? '#dc2626' : '#16a34a'" 
                    style="font-size: 22px; font-weight: 700;">
                {{ prod.stockActual }} uds
              </span>
            </div>
            <div style="text-align: right;">
              <p style="margin: 0; font-size: 12px; color: #64748b;">Mínimo Seguro</p>
              <span style="font-size: 16px; font-weight: 600; color: #475569;">
                {{ prod.stockMinimo }} uds
              </span>
            </div>
          </div>

          <!-- Alerta del sistema inteligente de InvenMax -->
          <div *ngIf="prod.stockActual < prod.stockMinimo" 
               style="margin-top: 16px; display: flex; align-items: center; gap: 8px; background-color: #fef2f2; color: #dc2626; padding: 8px 12px; border-radius: 6px; font-size: 12px; font-weight: 600;">
            <mat-icon style="font-size: 18px; width: 18px; height: 18px;">warning</mat-icon>
            <span>Alerta: Stock crítico por debajo del mínimo</span>
          </div>
        </mat-card-content>
      </mat-card>

    </div>

  </main>
</div>
