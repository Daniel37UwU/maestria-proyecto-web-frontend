<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title class="brand-title">InvenMax IA</mat-card-title>
      <mat-card-subtitle>Login</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content class="form-content">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Correo electrónico</mat-label>
        <input matInput placeholder="ejemplo@univo.edu" type="email">
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Contraseña</mat-label>
        <input matInput type="password" placeholder="Ingresa tu contraseña">
      </mat-form-field>
    </mat-card-content>

    <mat-card-actions class="actions-container">
      <!-- (click) ejecuta la función ingresarSistema() de nuestro TypeScript -->
      <button mat-raised-button color="primary" class="btn-block" (click)="ingresarSistema()">
        Ingresar al Sistema
      </button>
    </mat-card-actions>
  </mat-card>
</div>
